version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: travel_planner_db
    restart: always
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password
      POSTGRES_DB: travel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: travel_planner_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://travel_user:travel_password@db:5432/travel_db"
    depends_on:
      - db

volumes:
  postgres_data: